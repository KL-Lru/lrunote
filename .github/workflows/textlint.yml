name: Textlint

on:
  push:
    branches: [main, citest]

  pull_request:
    branches: [main]
    paths:
      - "src/**/*.md"
      - "src/**/*.mdx"

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install
        env:
          SKIP_CHROMIUM: "true"

      - name: Run textlint
        run: yarn textlint
